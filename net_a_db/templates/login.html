{% extends "base.html" %}

{% block content %}
{% load static %}
<main class="">
    <h2>ログイン画面</h2>
    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="form_menu">
            <label for="{{login_form.username.id_for_label}}" class="form_input">{{ login_form.username.label }}</label>
            {{ login_form.username }}
        </div>
        <div class="form_menu">
            <label for="{{login_form.password.id_for_label}}" class="form_input">{{ login_form.password.label }}</label>
            {{ login_form.password }}
        </div>
        <div class="form_menu">
            <label for="{{login_form.confirm_password.id_for_label}}" class="form_input">{{ login_form.confirm_password.label }}</label>
            {{ login_form.confirm_password }}
        </div>
        
        <!--{{ login_form.as_p }}-->
        <div class="form_menu"><input class="button_css" type="submit" value="ログイン"></div>
    </form>
</main>
{% endblock %}
